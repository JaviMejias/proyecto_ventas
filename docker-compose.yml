services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: proyecto_ventas_web
    volumes:
      - .:/app
    ports:
      - "3002:3000"
    environment:
      RAILS_ENV: development
      DATABASE_HOST: db
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
    depends_on:
      - db
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: proyecto_ventas_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5174:5173"
    environment:
      VITE_API_URL: "http://localhost:3002"
    depends_on:
      - web
    stdin_open: true
    tty: true

  db:
    image: postgres:14
    container_name: proyecto_ventas_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: proyecto_ventas_development
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
